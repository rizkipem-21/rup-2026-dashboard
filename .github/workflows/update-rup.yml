# .github/workflows/update-rup.yml
# 🤖 Auto Update RUP 2026 D228 - Jalankan setiap hari jam 05:00 WIB

name: 🤖 Update RUP 2026 D228

on:
  # Cron: 05:00 WIB (22:00 UTC) setiap hari
  schedule:
    - cron: '0 22 * * *'
  # Manual trigger dari Actions tab
  workflow_dispatch:
  # Auto-run jika process-rup.js diubah
  push:
    paths:
      - 'process-rup.js'
      - '.github/workflows/update-rup.yml'

env:
  NODE_VERSION: '20'

jobs:
  update-data:
    name: 📊 Download INAPROC & Process RUP
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    # 1. CHECKOUT REPO
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    # 2. SETUP ENVIRONMENT
    - name: 🛠️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # 3. VALIDASI TOKEN
    - name: 🔑 Validate INAPROC Token
      env:
        INAPROC_TOKEN: ${{ secrets.INAPROC_TOKEN }}
      run: |
        if [[ -z "$INAPROC_TOKEN" || "$INAPROC_TOKEN" == "inprc"* ]]; then
          echo "❌ INAPROC_TOKEN invalid or missing!"
          echo "   Settings > Secrets > INAPROC_TOKEN required"
          exit 1
        fi
        echo "✅ Token validated (length: ${#INAPROC_TOKEN})"

    # 4. CREATE DATA FOLDER
    - name: 📁 Setup data directory
      run: |
        mkdir -p data
        echo "📂 data/ folder ready"
        ls -la

    # 5. DOWNLOAD 5 FILE LEGACY INAPROC
    - name: 🌐 Download INAPROC Legacy Data
      env:
        INAPROC_TOKEN: ${{ secrets.INAPROC_TOKEN }}
      run: |
        echo "🚀 Downloading 5 Legacy files untuk KLPD D228 Tahun 2026..."
        echo "⏰ $(date)"
        
        curl -s -L -H "Authorization: Bearer $INAPROC_TOKEN" \
          "https://data.inaproc.id/api/legacy/rup/master-satker?kode_klpd=D228&tahun=2026" \
          -o data/Legacy_rup_master-satker_2026.json
        
        curl -s -L -H "Authorization: Bearer $INAPROC_TOKEN" \
          "https://data.inaproc.id/api/legacy/rup/paket-penyedia-terumumkan?kode_klpd=D228&tahun=2026" \
          -o data/Legacy_rup_paket-penyedia-terumumkan_2026.json
        
        curl -s -L -H "Authorization: Bearer $INAPROC_TOKEN" \
          "https://data.inaproc.id/api/legacy/rup/paket-swakelola-terumumkan?kode_klpd=D228&tahun=2026" \
          -o data/Legacy_rup_paket-swakelola-terumumkan_2026.json
        
        curl -s -L -H "Authorization: Bearer $INAPROC_TOKEN" \
          "https://data.inaproc.id/api/legacy/rup/program-master?kode_klpd=D228&tahun=2026" \
          -o data/Legacy_rup_program-master_2026.json
        
        curl -s -L -H "Authorization: Bearer $INAPROC_TOKEN" \
          "https://data.inaproc.id/api/legacy/rup/struktur-anggaran-pd?kode_klpd=D228&tahun=2026" \
          -o data/Legacy_rup_struktur-anggaran-pd_2026.json
        
        echo "✅ All 5 files downloaded!"
        ls -lh data/
        du -h data/*.json | sort -hr

    # 6. RUN PROCESSOR
    - name: ⚙️ Process RUP Data
      run: |
        echo "🔄 Running process-rup.js..."
        node process-rup.js

    # 7. VALIDATE OUTPUT
    - name: ✅ Validate Results
      run: |
        if [ ! -f "data/rekap.json" ]; then
          echo "❌ ERROR: rekap.json not generated!"
          exit 1
        fi
        RECORDS=$(jq length data/rekap.json)
        echo "✅ rekap.json OK: $RECORDS records"
        echo "📈 Top 3:"
        jq -r '.[0:3] | .[] | "\$.["Satuan Kerja"] | .[0:40])... \$.Persentase)%"' data/rekap.json

    # 8. GIT COMMIT
    - name: 💾 Commit & Push
      run: |
        git config user.name "INAPROC Bot 🤖"
        git config user.email "actions@github.com"
        
        git add data/*
        
        if ! git diff --staged --quiet; then
          RECORDS=$(jq length data/rekap.json)
          git commit -m "🤖 Update RUP 2026 D228

📊 $RECORDS satker
⏰ $(date +'%d/%m/%Y %H:%M WIB')" \
            -m "Auto-generated by GitHub Actions"
          git push
          echo "✅ Pushed to GitHub!"
        else
          echo "ℹ️ No changes"
        fi

    # 9. SUCCESS
    - name: 🎉 Success
      if: success()
      run: |
        echo "✅ Workflow completed!"
        echo "🌐 Live: https://YOURUSERNAME.github.io/rup-2026-dashboard"
        echo "📱 API: https://raw.githubusercontent.com/YOURUSERNAME/rup-2026-dashboard/main/data/rekap.json"

  notify:
    # Job terpisah untuk notifikasi
    needs: update-data
    runs-on: ubuntu-latest
    steps:
    - name: 📤 Status Report
      run: echo "Status: ${{ needs.update-data.result }}"
