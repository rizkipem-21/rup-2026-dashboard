<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap RUP 2026 - MOCK</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div id="loading" class="p-10 text-center text-xl">Loading...</div>

<div class="p-6">
    <h1 class="text-3xl font-bold mb-4">Rekap RUP 2026 (Mock 100 Satker)</h1>
    <p id="time" class="text-sm text-gray-500 mb-6"></p>

    <table class="w-full bg-white rounded shadow">
        <thead class="bg-blue-600 text-white">
            <tr>
                <th class="p-3 text-left">Satker</th>
                <th class="p-3 text-right">Pagu</th>
                <th class="p-3 text-right">Total RUP</th>
                <th class="p-3 text-right">%</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
</div>

<script>
function rupiah(n){
    return new Intl.NumberFormat('id-ID',{
        style:'currency',
        currency:'IDR',
        minimumFractionDigits:0
    }).format(n || 0);
}

function generateMockData(){
    return Array.from({length:100},(_,i)=>({
        nama:`Dinas ${['Pendidikan','Kesehatan','PU','Perhubungan','Lingkungan'][i % 5]} ${i+1}`,
        kode:`D228.${String(i+1).padStart(3,'0')}`,
        pagu:20000000000 + (i * 1500000000),
        rup:15000000000 + (i * 1200000000),
        persen:(60 + Math.random()*40).toFixed(2)
    }));
}

function render(data){
    document.getElementById("table").innerHTML = data.map(d=>`
        <tr class="border-b hover:bg-gray-50">
            <td class="p-3">
                <div class="font-bold">${d.nama}</div>
                <div class="text-xs text-gray-500">${d.kode}</div>
            </td>
            <td class="p-3 text-right">${rupiah(d.pagu)}</td>
            <td class="p-3 text-right">${rupiah(d.rup)}</td>
            <td class="p-3 text-right font-bold">${d.persen}%</td>
        </tr>
    `).join("");
}

function load(){
    const data = generateMockData();
    render(data);
    document.getElementById("time").innerText = new Date().toLocaleString('id-ID');
    document.getElementById("loading").style.display="none";
}

load();
</script>

</body>
</html>
